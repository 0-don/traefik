services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    depends_on:
      - crowdsec
    cpus: 6.0
    mem_limit: 16g
    memswap_limit: 16g
    command:
      - --providers.docker=true
      - --providers.file.directory=/etc/traefik/dynamic
      - --api.dashboard=true
      # LetsEncrypt
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=$TRAEFIK_ACME_EMAIL
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=30s
      - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=30s
      - --entrypoints.websecure.transport.respondingTimeouts.idleTimeout=60s
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.websecure.http.tls.certResolver=letsencrypt
      - --entrypoints.websecure.http.tls.domains[0].main=$TRAEFIK_BASE_DNS
      - --entrypoints.websecure.http.tls.domains[0].sans=*.$TRAEFIK_BASE_DNS
      # Trust Cloudflare IPs for real client IP
      - --entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22
      # CrowdSec bouncer on all HTTPS requests
      - --entrypoints.websecure.http.middlewares=crowdsec@file
      # Access logs for CrowdSec
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      # Backend response timeout (kill slow connections instead of holding them)
      - --serversTransport.forwardingTimeouts.responseHeaderTimeout=15s
      - --serversTransport.forwardingTimeouts.dialTimeout=5s
      - --serversTransport.forwardingTimeouts.idleConnTimeout=30s
      # CrowdSec bouncer plugin
      - --experimental.plugins.crowdsec-bouncer.modulename=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      - --experimental.plugins.crowdsec-bouncer.version=v1.5.0
    environment:
      - CLOUDFLARE_EMAIL=$CLOUDFLARE_EMAIL
      - CLOUDFLARE_DNS_API_TOKEN=$CLOUDFLARE_DNS_API_TOKEN
    ports:
      - 80:80
      - 443:443
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ~/traefik:/letsencrypt
      - traefik-logs:/var/log/traefik
      - ./dynamic:/etc/traefik/dynamic:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`$TRAEFIK_DASHBOARD_HOST`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$2y$$05$$QgoabVnNBN3gR4wezwQovOm0glw00bQvUPORrYxz7.rI/rnw07cBG

  autoheal:
    image: willfarrell/autoheal
    container_name: autoheal
    restart: always
    labels:
      - traefik.enable=false
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # One-shot container that tunes kernel params for DDoS resilience.
  # Runs at every `docker compose up`, exits immediately after applying.
  sysctl-init:
    image: alpine:latest
    container_name: sysctl-init
    privileged: true
    pid: host
    network_mode: host
    restart: "no"
    labels:
      - traefik.enable=false
    command:
      - sh
      - -c
      - |
        sysctl -w net.netfilter.nf_conntrack_max=2097152
        sysctl -w net.netfilter.nf_conntrack_buckets=262144
        sysctl -w net.netfilter.nf_conntrack_tcp_timeout_time_wait=30
        sysctl -w net.netfilter.nf_conntrack_tcp_timeout_established=300
        sysctl -w net.netfilter.nf_conntrack_tcp_timeout_close_wait=10

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: always
    cpus: 0.5
    labels:
      - traefik.enable=false
    environment:
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/http-dos"
      BOUNCER_KEY_traefik: "052ee0b1e0cf335d096ef25f5586491ec7bf217cddd7dc6e26ec215813e74f53"
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml
      - ./crowdsec/server-whitelist.yaml:/etc/crowdsec/parsers/s02-enrich/server-whitelist.yaml
      - ./crowdsec/server-whitelist.yaml:/etc/crowdsec/postoverflows/s01-whitelist/server-whitelist.yaml
      - crowdsec-db:/var/lib/crowdsec/data/
      - crowdsec-config:/etc/crowdsec/
      - traefik-logs:/var/log/traefik:ro
    networks:
      - proxy

volumes:
  traefik-logs:
  crowdsec-db:
  crowdsec-config:

networks:
  proxy:
    external: false
    name: proxy
