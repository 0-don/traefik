http:
  middlewares:
    # Global concurrent request limit for a service (not per-IP).
    # Prevents one overwhelmed backend from consuming all Traefik connections.
    inflight-limit:
      inFlightReq:
        amount: 100

    # Stops forwarding to a backend that is failing, returns 503 fast.
    # LatencyAtQuantileMS catches the 125-second response times from DDoS.
    circuit-breaker:
      circuitBreaker:
        expression: "LatencyAtQuantileMS(50.0) > 5000 || ResponseCodeRatio(500, 600, 0, 600) > 0.30 || NetworkErrorRatio() > 0.10"
        checkPeriod: 10s
        fallbackDuration: 15s
        recoveryDuration: 30s
