name: Docker Prod

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      - name: Create env file
        run: |
          touch .env
          echo CLOUDFLARE_DNS_API_TOKEN=${{ secrets.CLOUDFLARE_DNS_API_TOKEN }} >> .env
          echo CLOUDFLARE_EMAIL=${{ secrets.CLOUDFLARE_EMAIL }} >> .env
          echo TRAEFIK_ACME_EMAIL=${{ secrets.TRAEFIK_ACME_EMAIL }} >> .env
          echo TRAEFIK_BASE_DNS=${{ secrets.TRAEFIK_BASE_DNS }} >> .env
          echo TRAEFIK_DASHBOARD_HOST=${{ secrets.TRAEFIK_DASHBOARD_HOST }} >> .env
          echo TRAEFIK_USER_PASS=${{ secrets.TRAEFIK_USER_PASS }} >> .env
          echo TRAEFIK_PILOT_TOKEN=${{ secrets.TRAEFIK_PILOT_TOKEN }} >> .env
          echo CROWDSEC_BOUNCER_KEY=${{ secrets.CROWDSEC_BOUNCER_KEY }} >> .env
          cat .env

      - name: Generate CrowdSec dynamic config
        env:
          BOUNCER_KEY: ${{ secrets.CROWDSEC_BOUNCER_KEY }}
        run: |
          mkdir -p dynamic
          python3 -c "
          import os
          key = os.environ['BOUNCER_KEY']
          content = '''http:
            middlewares:
              crowdsec:
                plugin:
                  crowdsec-bouncer:
                    enabled: true
                    crowdsecMode: stream
                    crowdsecLapiScheme: http
                    crowdsecLapiHost: crowdsec:8080
                    crowdsecLapiKey: \"''' + key + '''\"
                    updateIntervalSeconds: 15
                    forwardedHeadersTrustedIPs:
                      - 172.16.0.0/12
                      - 10.0.0.0/8
                      - 192.168.0.0/16
                      - 173.245.48.0/20
                      - 103.21.244.0/22
                      - 103.22.200.0/22
                      - 103.31.4.0/22
                      - 141.101.64.0/18
                      - 108.162.192.0/18
                      - 190.93.240.0/20
                      - 188.114.96.0/20
                      - 197.234.240.0/22
                      - 198.41.128.0/17
                      - 162.158.0.0/15
                      - 104.16.0.0/13
                      - 104.24.0.0/14
                      - 172.64.0.0/13
                      - 131.0.72.0/22
          '''
          with open('dynamic/crowdsec.yml', 'w') as f:
              f.write(content)
          "

      - name: Docker run
        run: docker compose up -d --force-recreate --build
